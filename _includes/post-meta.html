<small class="small post-meta">
  <time datetime="{{ page.date | date_to_xmlschema }}" class="time">{{ page.date | date: "%B %d, %Y" }}</time>
  <span class="views-meta-divider">&nbsp;&middot;&nbsp;</span>
  <span class="post-views-count" data-post-url="{{ page.url | slugify }}">... views</span>
</small>
